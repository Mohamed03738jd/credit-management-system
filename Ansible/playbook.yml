- name: Suppression et Réinstallation de Kubernetes et Docker
  hosts: all
  become: yes
  gather_facts: yes  

  tasks:

    - name: Arrêter Docker et Kubelet si existants
      service:
        name: "{{ item }}"
        state: stopped
        enabled: no
      loop:
        - docker
        - kubelet
      ignore_errors: yes

    - name: Enlever le hold sur les paquets Kubernetes
      shell: apt-mark unhold kubelet kubeadm kubectl || true
      changed_when: false

    - name: Désinstaller Docker et Kubernetes
      apt:
        name:
          - docker.io
          - docker-ce
          - docker-ce-cli
          - kubelet
          - kubeadm
          - kubectl
        state: absent
        purge: yes
      ignore_errors: yes

    - name: Démonter les volumes Kubernetes encore montés
      shell: |
        mount | grep kubelet | awk '{print $3}' | xargs -r umount -lf || true
      changed_when: false

    - name: Supprimer les fichiers et configurations
      file:
        path: "{{ item }}"
        state: absent
      loop:
        - /var/lib/docker
        - /var/lib/kubelet
        - /etc/docker
        - /etc/kubernetes
        - /etc/apt/sources.list.d/kubernetes.list
        - /etc/apt/sources.list.d/docker.list
        - /etc/apt/keyrings/docker.gpg
        - /etc/apt/keyrings/kubernetes.gpg
      ignore_errors: yes

    - name: Nettoyer les paquets inutiles
      apt:
        autoremove: yes
        autoclean: yes

    # ================================
    # 🔹 INSTALLATION DOCKER
    # ================================
    - name: Installer les dépendances nécessaires
      apt:
        name:
          - apt-transport-https
          - ca-certificates
          - curl
          - gnupg
          - lsb-release
        state: present
        update_cache: yes

    - name: Créer le dossier keyrings
      file:
        path: /etc/apt/keyrings
        state: directory
        mode: '0755'

    - name: Ajouter la clé GPG de Docker
      shell: |
        curl -fsSL https://download.docker.com/linux/ubuntu/gpg | \
        gpg --dearmor -o /etc/apt/keyrings/docker.gpg
      args:
        creates: /etc/apt/keyrings/docker.gpg

    - name: Ajouter le dépôt Docker
      apt_repository:
        # ✅ ansible_distribution_release au lieu de ansible_lsb.codename
        repo: "deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
        state: present
        filename: docker

    - name: Installer Docker CE
      apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
        state: present
        update_cache: yes

    - name: Activer et démarrer Docker
      service:
        name: docker
        state: started
        enabled: yes

  
    - name: Désactiver le swap
      shell: swapoff -a && sed -i '/swap/d' /etc/fstab
      changed_when: false

    - name: Charger les modules noyau
      shell: modprobe overlay && modprobe br_netfilter
      changed_when: false

    - name: Configurer sysctl pour Kubernetes
      copy:
        dest: /etc/sysctl.d/k8s.conf
        content: |
          net.bridge.bridge-nf-call-iptables  = 1
          net.bridge.bridge-nf-call-ip6tables = 1
          net.ipv4.ip_forward                 = 1

    - name: Appliquer les paramètres sysctl
      shell: sysctl --system
      changed_when: false


    - name: Ajouter la clé GPG de Kubernetes
      shell: |
        curl -fsSL https://pkgs.k8s.io/core:/stable:/v1.28/deb/Release.key | \
        gpg --dearmor -o /etc/apt/keyrings/kubernetes.gpg
      args:
        creates: /etc/apt/keyrings/kubernetes.gpg

    - name: Ajouter le dépôt Kubernetes
      apt_repository:
        repo: "deb [signed-by=/etc/apt/keyrings/kubernetes.gpg] https://pkgs.k8s.io/core:/stable:/v1.28/deb/ /"
        state: present
        filename: kubernetes

    - name: Installer Kubernetes
      apt:
        name:
          - kubelet
          - kubeadm
          - kubectl
        state: present
        update_cache: yes

    - name: Figer les versions Kubernetes
      shell: apt-mark hold kubelet kubeadm kubectl
      changed_when: false

    - name: Activer et démarrer Kubelet
      service:
        name: kubelet
        state: started
        enabled: yes
    - name: Vérifier les versions installées
      shell: |
        docker --version
        kubelet --version
        kubeadm version -o short
        kubectl version --client
      register: binaries
      changed_when: false

    - name: Afficher les versions
      debug:
        msg: "{{ binaries.stdout_lines }}"